<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expedição Mantiqueira</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b3022">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">


    <link rel="icon" sizes="192x192" href="icon.png">
    <link rel="icon" sizes="512x512" href="icon.png">

    <style>
        /* --- FONTES LOCAIS --- */
        @font-face {
            font-family: 'Playfair Display';
            font-weight: 700;
            src: url('./fonts/playfair-display-v37-latin-700.woff2') format('woff2'); 
        }
        @font-face {
            font-family: 'Playfair Display';
            font-style: italic;
            font-weight: 400;
            src: url('./fonts/playfair-display-v37-latin-italic.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Montserrat';
            font-weight: 400;
            src: url('./fonts/montserrat-v26-latin-regular.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Montserrat';
            font-weight: 600;
            src: url('./fonts/montserrat-v26-latin-600.woff2') format('woff2');
        }

        :root {
            --primary: #1b3022; 
            --accent: #c0a080;  
            --bg-paper: #f9f7f2; 
            --text: #2c2c2c;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-paper); 
            overflow: hidden; color: var(--text);
        }

        /* --- TELA INTRODUTÓRIA --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-paper);
            background-image: radial-gradient(var(--accent) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            transition: opacity 1s ease, visibility 1s;
        }

        #intro-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #intro-screen h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        #intro-screen p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #444;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* --- MAPA E UI --- */
        #map-container { 
            height: 55%; width: 100%; position: relative; 
            overflow: hidden; border-bottom: 2px solid var(--accent);
        }
        
        #map { height: 100%; width: 100%; background: #e0ddd4; }

        #fog-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000;
            pointer-events: none;
            backdrop-filter: blur(20px) sepia(0.5);
            background: rgba(249, 247, 242, 0.4);
            mask-image: none;
            -webkit-mask-image: none;
        }

        #ui-container { 
            height: 45%; padding: 25px; box-sizing: border-box; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; background: var(--bg-paper);
            background-image: radial-gradient(var(--accent) 0.5px, transparent 0.5px);
            background-size: 20px 20px; position: relative;
        }

        .enigma-box { width: 100%; max-width: 450px; z-index: 1; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--primary); margin: 0; font-size: 1.6rem; }
        #step-indicator { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; display: block; margin-bottom: 5px; cursor: pointer; }
        
        .clue-text { font-family: 'Playfair Display', serif; font-style: italic; color: #444; margin: 15px 0; font-size: 1.15rem; line-height: 1.4; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        
        input[type="text"] { padding: 15px; width: 90%; background: transparent; border: none; border-bottom: 2px solid var(--accent); font-size: 1.2rem; text-align: center; outline: none; margin-bottom: 20px; font-family: 'Montserrat', sans-serif; }

        button { padding: 15px 40px; background: var(--primary); color: var(--bg-paper); border: 1px solid var(--accent); border-radius: 50px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(27, 48, 34, 0.2); }

        .success-msg { color: var(--primary); font-weight: 600; margin-top: 15px; display: none; }
    </style>

    <link rel="stylesheet" href="leaflet.css" />
</head>
<body>

<div id="intro-screen">
    <h1>Expedição Mantiqueira</h1>
    <p>"Para alguns, é apenas um mapa. Para nós, é o rastro de uma história que estamos prestes a escrever."</p>
    <button onclick="startExpedition()">Iniciar Jornada</button>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="fog-overlay"></div>
</div>

<div id="ui-container">
    <div class="enigma-box" id="game-ui">
        <span id="step-indicator" onclick="secretReset()">Registro de Viagem</span>
        <h2 id="destination-title">Destino Oculto</h2>
        <p class="clue-text" id="clue-display">Carregando coordenadas...</p>
        
        <div id="interaction-area">
            <input type="text" id="pass-input" placeholder="Palavra-chave..." autocomplete="off">
            <button id="main-btn" onclick="checkPass()">Desbloquear Rota</button>
        </div>
        
        <p class="success-msg" id="msg">✨ Ponto Revelado ✨</p>
    </div>
</div>

<script src="leaflet.js"></script>

<script>
    // 1. DADOS GEOGRÁFICOS
    const caminhosGeoJSON = {
        "type": "FeatureCollection",
        "features": [
            { "type": "Feature", "properties": { "trecho_id": 0 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -46.483006522206551, -23.434932383029707 ], [ -46.107554598556021, -23.319521610478986 ], [ -45.887673727846689, -23.19143566637646 ], [ -45.926099511077446, -23.078293082419233 ], [ -45.857787007556112, -23.009446887464122 ], [ -45.838640827369957, -22.95597767694424 ] ] ] } },
            { "type": "Feature", "properties": { "trecho_id": 1 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -45.838540760226131, -22.954443314072176 ], [ -45.756318923712392, -22.817051125593444 ], [ -45.62769928817611, -22.828792337136175 ], [ -45.625697945299507, -22.792101051065139 ], [ -45.59297209905894, -22.738259627341016 ] ] ] } },
            { "type": "Feature", "properties": { "trecho_id": 2 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -45.591637870474557, -22.72791935581191 ], [ -45.600747870771194, -22.660546112643171 ], [ -45.66881646062933, -22.656256255034432 ] ] ] } },
            { "type": "Feature", "properties": { "trecho_id": 3 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -45.668718757474004, -22.656621515832978 ], [ -45.657344458791982, -22.686474880408955 ] ] ] } },
            { "type": "Feature", "properties": { "trecho_id": 4 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -45.656560599498647, -22.685874477545976 ], [ -45.601607059678628, -22.658889704426457 ], [ -45.515415893126288, -22.556154103427549 ], [ -45.481793332799377, -22.459555953916897 ], [ -45.449000495873406, -22.425299635012408 ] ] ] } },
            { "type": "Feature", "properties": { "trecho_id": 5 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -45.449242324804331, -22.425032789295514 ], [ -45.454412460568896, -22.415843289920449 ] ] ] } },
            { "type": "Feature", "properties": { "trecho_id": 6 }, "geometry": { "type": "MultiLineString", "coordinates": [ [ [ -45.44929235837624, -22.425316312869697 ], [ -45.714353544524862, -22.25496867835626 ], [ -45.939571329571798, -22.233621021005842 ], [ -46.356918030772519, -22.276316335706682 ] ] ] } }
        ]
    };

    const GRU_COORDS = [-23.425701,-46.482464];
    const destinations = [
        { id: 0, name: "Monteiro Lobato", pass: "sitio", clue: "Onde o tempo para, o Jeca Tatu descansa e as histórias ganham vida." , coords: [-22.9543304,-45.8387249] },
        { id: 1, name: "Vila Capivari", pass: "suica", clue: "Arquitetura europeia, perfume de chocolate e o coração da Serra." , coords: [-22.7317, -45.5911] },
        { id: 2, name: "Chalé em São Bento", pass: "sossego", clue: "Nosso refúgio particular. Onde o vinho encontra o calor da madeira." , coords: [-22.6558138,-45.6688404] },
        { id: 3, name: "Pedra do Baú", pass: "bau", clue: "O baú de pedra guardado por gigantes no nosso horizonte." , coords: [-22.6857839,-45.6570596] },
        { id: 4, name: "Vamos para Itajubá!", pass: "katana", clue: "Precisão na faca, sabor no prato. Uma ilha oriental nas montanhas." , coords: [-22.4251246,-45.4489544] },
        { id: 5, name: "Rodízio Japonês", pass: "katana", clue: "Precisão na faca, sabor no prato. Uma ilha oriental nas montanhas." , coords: [-22.4155463,-45.4544528] },
        { id: 6, name: "Ouro Fino", pass: "porteira", clue: "Onde o Menino da Porteira toca o berrante e o abraço da família nos espera." , coords: [-22.2831, -46.3686] }
    ];

    let currentStep = localStorage.getItem('tripProgress') ? parseInt(localStorage.getItem('tripProgress')) : 0;
    let map;
    let resetCounter = 0;

    // 2. TELA DE INÍCIO
    function startExpedition() {
        document.getElementById('intro-screen').classList.add('hidden');
        // Se for o início do jogo, o mapa foca em GRU
        if (currentStep === 0) {
            map.flyTo(GRU_COORDS, 11, { duration: 2 });
        }
    }

    function initMap() {
        map = L.map('map', { 
            zoomControl: false,
            minZoom: 8,
            maxZoom: 16
        }).setView(GRU_COORDS, 11);

        const imageUrl = 'mapa_base.png';
        const imageBounds = [[-23.575875703,-46.653102575], [-22.062068259,-45.281896599]]; 
        L.imageOverlay(imageUrl, imageBounds).addTo(map);

        L.marker(GRU_COORDS).addTo(map).bindPopup("Início da Expedição");

        map.on('move zoom viewreset', updateFogHoles);
        renderProgress();

        // Se o usuário já iniciou antes (currentStep > 0), pula a intro automaticamente
        if (currentStep > 0) {
            document.getElementById('intro-screen').style.display = 'none';
        }
    }

    const lineStyle = { color: "#196e08", weight: 4, opacity: 1, dashArray: "10, 10", lineJoin: "round" };

    function updateFogHoles() {
        const overlay = document.getElementById('fog-overlay');
        const zoom = map.getZoom();
        
        const baseRadius = 400;
        const baseZoom = 12;
        const dynamicRadius = baseRadius * Math.pow(2, zoom - baseZoom);

        let maskGradients = [];

        // Furo de Guarulhos nítido desde o começo
        const gruPoint = map.latLngToContainerPoint(GRU_COORDS);
        maskGradients.push(`radial-gradient(circle ${dynamicRadius}px at ${gruPoint.x}px ${gruPoint.y}px, transparent 0%, black 100%)`);

        for (let i = 0; i < currentStep; i++) {
            const point = map.latLngToContainerPoint(destinations[i].coords);
            maskGradients.push(`radial-gradient(circle ${dynamicRadius}px at ${point.x}px ${point.y}px, transparent 0%, black 100%)`);
        }

        const maskString = maskGradients.join(', ');
        overlay.style.webkitMaskImage = maskString;
        overlay.style.maskImage = maskString;
        overlay.style.webkitMaskComposite = "destination-in"; 
        overlay.style.maskComposite = "intersect";
    }

    function normalize(text) { return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }

    function checkPass() {
        const input = document.getElementById('pass-input');
        if (normalize(input.value) === destinations[currentStep].pass) {
            unlockCurrent();
        } else {
            input.style.borderBottomColor = "#d62828";
            setTimeout(() => { input.style.borderBottomColor = "var(--accent)"; }, 1000);
        }
    }

    function unlockCurrent() {
        const d = destinations[currentStep];
        L.marker(d.coords).addTo(map).bindPopup(`<b>${d.name}</b>`).openPopup();
        
        L.geoJSON(caminhosGeoJSON, {
            filter: (feature) => feature.properties.trecho_id === currentStep,
            style: lineStyle
        }).addTo(map);

        map.flyTo(d.coords, 12, { duration: 3 });
        
        document.getElementById('pass-input').style.display = "none";
        document.getElementById('msg').style.display = "block";
        document.getElementById('destination-title').innerText = d.name;
        
        currentStep++;
        localStorage.setItem('tripProgress', currentStep);
        setTimeout(updateFogHoles, 500);

        const btn = document.getElementById('main-btn');
        if (currentStep < destinations.length) {
            btn.innerText = "Próxima Dica";
            btn.onclick = prepareNextStep;
        } else {
            btn.innerText = "Viagem Completa! ❤️";
            btn.disabled = true;
        }
    }

    function prepareNextStep() {
        document.getElementById('pass-input').style.display = "inline-block";
        document.getElementById('pass-input').value = "";
        document.getElementById('msg').style.display = "none";
        document.getElementById('main-btn').innerText = "Desbloquear Rota";
        document.getElementById('main-btn').onclick = checkPass;
        map.flyTo([-22.7, -45.7], 9, { duration: 2 });
        updateClue();
    }

    function updateClue() {
        if (currentStep < destinations.length) {
            const d = destinations[currentStep];
            document.getElementById('destination-title').innerText = "Destino Oculto";
            document.getElementById('clue-display').innerText = d.clue;
            document.getElementById('step-indicator').innerText = `Registro ${currentStep + 1} de ${destinations.length}`;
        }
    }

    function renderProgress() {
        for (let i = 0; i < currentStep; i++) {
            L.marker(destinations[i].coords).addTo(map);
        }
        L.geoJSON(caminhosGeoJSON, {
            filter: (feature) => feature.properties.trecho_id < currentStep,
            style: lineStyle
        }).addTo(map);

        if (currentStep >= destinations.length) {
            document.getElementById('game-ui').innerHTML = "<span id='step-indicator' onclick='secretReset()'>Expedição Concluída</span><h2 style='font-size: 2rem'>Ouro Fino nos espera!</h2><p class='clue-text'>Até a próxima aventura ❤️</p>";
        } else {
            updateClue();
        }
        updateFogHoles();
    }

    function secretReset() {
        resetCounter++;
        if (resetCounter >= 5) {
            localStorage.clear();
            window.location.href = window.location.pathname;
        }
    }

    // Registro do Service Worker para funcionamento Offline
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Expedição pronta para modo offline!"))
        .catch(err => console.log("Erro no Service Worker:", err));
    }

    window.onload = initMap;
</script>
</body>
</html>
